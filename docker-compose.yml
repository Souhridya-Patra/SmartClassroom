services:

  db:
    build: ./db
    container_name: smart_db
    restart: always
    env_file: .env
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - db_data:/var/lib/mysql

  backend-service:
    build: ./backend-service
    container_name: backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: .env
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 10

  ai-service:
    build: ./ai-service
    container_name: ai_service
    depends_on:
      backend-service:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "8002:8000"

  frontend:
    build: ./frontend
    container_name: smart_frontend
    depends_on:
      backend-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  db_data:
