server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=10s ipv6=off;

    client_max_body_size 20m;
    client_body_buffer_size 1m;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:html|js|css)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location /api/ai/ {
    proxy_pass https://smartclassroom-ai.onrender.com/;
    proxy_ssl_server_name on;

    proxy_http_version 1.1;
    proxy_set_header Host smartclassroom-ai.onrender.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

location /api/backend/ {
    proxy_pass https://smartclassroom-luan.onrender.com/;
    proxy_ssl_server_name on;

    proxy_http_version 1.1;
    proxy_set_header Host smartclassroom-luan.onrender.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}
